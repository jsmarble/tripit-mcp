name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# One CI run per ref; superseded runs on the same PR/branch are cancelled.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    outputs:
      can-deploy: ${{ steps.deploy-secret.outputs.present }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint and format (Biome)
        run: npm run lint

      - name: Generate Worker types
        run: npm run types

      - name: Typecheck
        run: npm run check

      - name: Test (vitest, workerd runtime)
        run: npm test

      - name: Bundle dry run
        run: npx wrangler deploy --dry-run --outdir dist

      - name: Check deploy secret is configured
        id: deploy-secret
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: echo "present=${{ env.CLOUDFLARE_API_TOKEN != '' }}" >> "$GITHUB_OUTPUT"

  deploy:
    name: Deploy to Cloudflare
    needs: quality
    if: >-
      (github.event_name == 'push' || github.event_name == 'workflow_dispatch') &&
      github.ref == 'refs/heads/main' &&
      needs.quality.outputs.can-deploy == 'true'
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://mcp.joshuamarble.io/tripit
    # Never cancel a deploy mid-flight; queue subsequent ones.
    concurrency:
      group: deploy-production
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: package.json
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Deploy (wrangler)
        uses: cloudflare/wrangler-action@ebbaa1584979971c8614a24965b4405ff95890e0 # v4.0.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Post-deploy smoke test
        run: |
          set -euo pipefail
          MCP=https://mcp.joshuamarble.io/tripit
          FALLBACK=https://tripit-mcp.tolvit-llc.workers.dev

          echo "health check (shared hostname route)..."
          for _ in $(seq 1 10); do
            body=$(curl -sf "$MCP/health") && break
            sleep 3
          done
          echo "$body" | grep -q '"status":"ok"'

          echo "health check (workers.dev fallback)..."
          curl -sf "$FALLBACK/health" | grep -q '"status":"ok"'

          echo "credential-less MCP endpoint must 401..."
          code=$(curl -s -o /dev/null -w '%{http_code}' "$MCP" \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":1,"method":"tools/list"}')
          test "$code" = "401"

          echo "tools/list with dummy credentials must return the tool set..."
          curl -s "$MCP" \
            -H 'Authorization: Bearer ci:smoke:test:creds' \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -d '{"jsonrpc":"2.0","id":2,"method":"tools/list"}' \
            | grep -q '"tripit_list_trips"'

          echo "smoke test passed"
